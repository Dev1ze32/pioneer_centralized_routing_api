# ACU Routing API — Docker Compose
#
# Services:
#   db      — PostgreSQL 18
#   api     — Flask + Waitress
#   backup  — Automated weekly + monthly pg_dump backups
#
# Usage:
#   docker compose up -d                     start everything
#   docker compose logs -f backup            watch backup logs
#   docker compose exec backup backup.sh weekly   run a manual backup now
#   docker compose down                      stop (data + backups preserved)
#   docker compose down -v                   stop AND delete DB volume

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:18
    container_name: acu-routing-db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${DB_NAME:-routing_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-routing_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    expose:
      - "5432"

    networks:
      - internal

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: acu-routing-api
    restart: unless-stopped

    env_file: .env
    environment:
      DB_HOST: db

    ports:
      - "0.0.0.0:${WAITRESS_PORT:-5000}:${WAITRESS_PORT:-5000}"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - internal

  # ── Backup ──────────────────────────────────────────────────────────────────
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: acu-routing-backup
    restart: unless-stopped

    environment:
      DB_HOST:     db
      DB_PORT:     ${DB_PORT:-5432}
      DB_NAME:     ${DB_NAME:-routing_db}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}

    volumes:
      # Backup files land on the HOST at ./backups/ so they survive
      # even if the container or the postgres_data volume is destroyed.
      - ./backups:/backups

    depends_on:
      db:
        condition: service_healthy

    networks:
      - internal

# ── Shared internal network ───────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ── Persistent storage ────────────────────────────────────────────────────────
volumes:
  postgres_data: